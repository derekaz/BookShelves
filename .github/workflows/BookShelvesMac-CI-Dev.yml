name: BookShelves.Maui Mac CI Dev

on:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
  # push:
  #   branches:
  #      - 'main'
  #      - 'release/*'  
  #   paths:
  #     - 'src/BookShelves.Maui/**'
  #     - 'src/BookShelves.Shared/**'
  #     - '**/*build.props'  
  #     - '**/GitVersion.yml'
  #     - '.github/workflows/BookShelvesMac-CI-Dev.yml'
  # pull_request:
  #   types: [opened, synchronize]
  #   branches: 
  #     - '**'
  #   paths:
  #     - 'src/BookShelves.Maui/**'
  #     - 'src/BookShelves.Shared/**'
  #     - '**/*build.props'      
  #     - '**/GitVersion.yml'
  #     - '.github/workflows/BookShelvesMac-CI-Dev.yml'

concurrency:
  group: maui-mac-dev-${{github.ref}}
  cancel-in-progress: true

jobs:
  mac-build-mac:
    runs-on: macos-26
    timeout-minutes: 45
    env:
      PROJPATH: 'src/BookShelves.Maui'
      CSPROJ: 'BookShelves.Maui.csproj'
      PUBLISH_PATH: '${{github.workspace}}/publish-output'
      MAC_ARTIFACTS_PATH: 'artifacts_mac'
      BUILD_LOG_FILE: 'mac.binlog'
      BUNDLE_ID: 'com.azmoore.bookshelves.maui'
      CODESIGN_PROVISION: 'BookShelves MacOS Provisioning'
      CODESIGN_KEY: 'Apple Distribution: Derek Moore (TPKXH5FT2P)'
      PACKAGE_SIGNING_KEY: '3rd Party Mac Developer Installer: Derek Moore (TPKXH5FT2P)'
      CODESIGN_ENTITLEMENTS: 'Platforms\MacCatalyst\Entitlements.plist'
      DOTNET_VERSION: 'net10.0'
      DOTNET_SDK_VERSION: '10.0.x'
      RELEASE_CONFIGURATION: 'Release'
      XCODE_VERSION: '26.4.1'
    defaults:
      run:
        working-directory: ${{env.PROJPATH}}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
  
      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v4.7.0
        with:
          versionSpec: '6.8.x'

      - name: Determine Version
        id: version_step # step id used as a reference for output values
        uses: gittools/actions/gitversion/execute@v4.7.0
  
      # Select your required version
      - name: xcode diags 1
        run: |
            echo Mac OS version: $(sw_vers -productVersion)
            echo Installed Xcode versions:
            ls /Applications | grep 'Xcode'
            echo Currently selected Xcode:
            xcrun xcode-select --print-path

      # Select your required version
      - name: Select Xcode ${{env.XCODE_VERSION}}
        run: sudo xcode-select -s /Applications/Xcode_${{env.XCODE_VERSION}}.app #/Contents/Developer

      - name: Verify Xcode version
        run: xcodebuild -version

      - name: Add Xcode developer tools to PATH
        run: export PATH="/Applications/Xcode_${{env.XCODE_VERSION}}.app/Contents/Developer/usr/bin:$PATH"

      - name: Set some env variables (CURRENT_DATE, CURRENT_TIME, ASSEMBLY_BUILD_NUMBER)
        run: |
            echo "CURRENT_DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV
            echo "CURRENT_TIME=$(date +'%H:%M:%S')" >> $GITHUB_ENV

      # - name: Set Application_Display_Version as env variable
      #   id: get_application_version
      #   shell: pwsh
      #   run: |
      #     pwsh --version
       
      #    # Read the .csproj file and parse it as XML
      #    [xml]$xml = Get-Content -Path ${{env.CSPROJ}} # Replace "YourMauiProject.csproj"

      #    # Get the ApplicationDisplayVersion
      #    [string]$dirtyApplicationDisplayVersion = $xml.Project.PropertyGroup.ApplicationDisplayVersion
      #    if ($dirtyApplicationDisplayVersion -ne $null) {
      #      $applicationDisplayVersion = $dirtyApplicationDisplayVersion.Trim()
      #    } else {
      #      $applicationDisplayVersion = "" # Or handle the null case
      #    }

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{env.DOTNET_SDK_VERSION}}

      - name: Restore Workloads
        run: dotnet workload restore # ${{env.PROJPATH}} # ${{env.CSPROJ}}

      - name: Cert Info 1
        env:
          CERTIFICATE_BASE64: ${{secrets.MAC_COMBINED_DIST_INST_CERT_P12}}
        run: |
          echo $CERTIFICATE_BASE64 | base64 --decode > cert.p12
      - name: Cert Info 2
        run: |
          openssl pkcs12 -in cert.p12 -passin pass:${{secrets.IOS_DIST_CERTIFICATES_P12_PASSWORD}} -info -nokeys

      - name: Import Code-Signing Certificates
        uses: Apple-Actions/import-codesign-certs@v7
        with:
          # use this one for Mac app store/test flight
          p12-file-base64: ${{secrets.MAC_COMBINED_DIST_INST_CERT_P12}}
          
          # use this one for ad-hoc
          #p12-file-base64: ${{ secrets.APPLE_DEVELOPMENT_CERT_P12 }}
          
          p12-password: ${{secrets.IOS_DIST_CERTIFICATES_P12_PASSWORD}}
      
      # - name: Issuer ID
      #   run: |
      #     echo ${{ secrets.APPLE_APPSTORE_ISSUER_ID }} | sed 's/./& /g'
      # - name: Key ID
      #   run: |
      #     echo ${{ secrets.APPLE_APPSTORE_KEY_ID }} | sed 's/./& /g'
      # - name: Priv K
      #   run: |
      #     echo "${{ secrets.APPLE_APPSTORE_PRIVATE_KEY }}" | sed 's/./& /g'

      # For the type of profile to download: One of IOS_APP_DEVELOPMENT, IOS_APP_STORE, IOS_APP_ADHOC, IOS_APP_INHOUSE, MAC_APP_DEVELOPMENT, MAC_APP_STORE, MAC_APP_DIRECT, TVOS_APP_DEVELOPMENT, TVOS_APP_STORE, TVOS_APP_ADHOC, TVOS_APP_INHOUSE'
      - name: Download Apple Provisioning Profiles
        uses: Apple-Actions/download-provisioning-profiles@v6
        with:
          bundle-id: ${{env.BUNDLE_ID}}
          # profile-type: 'MAC_APP_DEVELOPMENT' (get all profiles)
          issuer-id: ${{secrets.APPLE_APPSTORE_ISSUER_ID}}
          api-key-id: ${{secrets.APPLE_APPSTORE_KEY_ID}}
          api-private-key: ${{secrets.APPLE_APPSTORE_PRIVATE_KEY}}

      # - name: Download Apple Provisioning Profiles
      #   uses: Apple-Actions/download-provisioning-profiles@v6
      #   with:
      #     bundle-id: ${{env.BUNDLE_ID}}
      #     profile-type: 'MAC_APP_DEVELOPMENT'
      #     issuer-id: ${{secrets.APPLE_APPSTORE_ISSUER_ID}}
      #     api-key-id: ${{secrets.APPLE_APPSTORE_KEY_ID}}
      #     api-private-key: ${{secrets.APPLE_APPSTORE_PRIVATE_KEY}}

      # - name: Download Apple Provisioning Profiles
      #   uses: Apple-Actions/download-provisioning-profiles@v6
      #   with:
      #     bundle-id: ${{env.BUNDLE_ID}}
      #     profile-type: 'MAC_CATALYST_APP_DEVELOPMENT'
      #     issuer-id: ${{secrets.APPLE_APPSTORE_ISSUER_ID}}
      #     api-key-id: ${{secrets.APPLE_APPSTORE_KEY_ID}}
      #     api-private-key: ${{secrets.APPLE_APPSTORE_PRIVATE_KEY}}

      # - name: Download Apple Provisioning Profiles
      #   uses: Apple-Actions/download-provisioning-profiles@v6
      #   with:
      #     bundle-id: ${{env.BUNDLE_ID}}
      #     profile-type: 'MAC_APP_STORE'
      #     issuer-id: ${{secrets.APPLE_APPSTORE_ISSUER_ID}}
      #     api-key-id: ${{secrets.APPLE_APPSTORE_KEY_ID}}
      #     api-private-key: ${{secrets.APPLE_APPSTORE_PRIVATE_KEY}}

      # - name: Rename file 
      #   run: |
      #     cd '/Users/runner/Library/MobileDevice/Provisioning Profiles'
      #     for file in *mobileprovision; do mv "$file" "${file/mobileprovision/provisionprofile}"; done

      # don't have one of these types yet
      # - name: Download Apple Provisioning Profiles
      #   uses: Apple-Actions/download-provisioning-profiles@v1
      #   with:
      #     bundle-id: ${{env.BUNDLE_ID}}
      #     profile-type: 'MAC_APP_DIRECT'
      #     issuer-id: ${{ secrets.APPLE_APPSTORE_ISSUER_ID }}
      #     api-key-id: ${{ secrets.APPLE_APPSTORE_KEY_ID }}
      #     api-private-key: ${{ secrets.APPLE_APPSTORE_PRIVATE_KEY }}

      - name: Create publish folder
        shell: pwsh
        run: |
          cd ${{github.workspace}}
          mkdir -p ${{env.PUBLISH_PATH}}

      - name: NuGet Restore
        run: dotnet restore ${{env.CSPROJ}}

      - name: Build MAC MAUI Mobile app
        shell: pwsh
        run: |
          #ad-hoc deployment
          #dotnet publish ${{env.CSPROJ}} -v diag -bl:${{env.BUILD_LOG_FILE}} -f net8.0-maccatalyst -c Release -o ${{ env.PUBLISH_PATH }} -p:ApplicationVersion=${{ env.ASSEMBLY_BUILD_NUMBER }} -p:MtouchLink=SdkOnly -p:CreatePackage=true -p:EnableCodeSigning=true -p:CodesignKey="Apple Development: Derek Moore (C52LX4JJTM)" -p:CodesignProvision="BookShelvesApp (MacCatalyst Ad-Hoc)" -p:UseHardenedRuntime=true

          #app store deployment   -p:RuntimeIdentifier=maccatalyst-x64
          dotnet `
            publish `
            ${{env.CSPROJ}} `
            -v diagnostic `
            -f ${{env.DOTNET_VERSION}}-maccatalyst `
            -c ${{env.RELEASE_CONFIGURATION}} `
            -o ${{env.PUBLISH_PATH}} `
            -p:MtouchLink=SdkOnly `
            -p:CreatePackage=true `
            -p:EnableCodeSigning=true `
            -p:CodesignKey="${{env.CODESIGN_KEY}}" `
            -p:CodesignProvision="${{env.CODESIGN_PROVISION}}" `
            -p:EnablePackageSigning=true `
            -p:PackageSigningKey="${{env.PACKAGE_SIGNING_KEY}}" `
            -p:CodesignEntitlements="${{env.CODESIGN_ENTITLEMENTS}}" `
            -p:UseHardenedRuntime=true `
            -p:MtouchUseLlvm=false
            # -p:ApplicationVersion=${{env.ASSEMBLY_BUILD_NUMBER}} `
            # -v options: normal, minimal, quiet, detailed, diagnostic
            # -bl:${{env.BUILD_LOG_FILE}} `
      
      - name: Show workspace folder content
        shell: pwsh
        run: |
          cd '${{github.workspace}}'
          Get-Childitem -Path ${{github.workspace}} -Include *.* -File -Recurse

      - name: Show publish folder content
        shell: pwsh
        run: |
          Get-Childitem -Path ${{env.PUBLISH_PATH}} -Include *.* -File -Recurse

      - name: Locate PKG
        # if: ${{ github.event_name == 'workflow_dispatch' }}
        id: findpkg
        run: |
          PKG_PATH=$(find ${{env.PUBLISH_PATH}} -maxdepth 1 -name '*.pkg' | head -n1)
          if [ -z "$PKG_PATH" ]; then
            echo 'PKG not found' >&2
            exit 1
          fi
          echo "pkg=$PKG_PATH" >> $GITHUB_OUTPUT

      - name: Archive build artifact
        uses: actions/upload-artifact@v7
        with:
          name: 'mac pkg'
          path: ${{steps.findpkg.outputs.pkg}}
          compression-level: 0

      - name: Authenticate App Store Connect API Key
        run: |
          mkdir -p ~/private_keys
          echo "${{ secrets.APPLE_APPSTORE_PRIVATE_KEY }}" > ~/private_keys/AuthKey_${{ secrets.APPLE_APPSTORE_KEY_ID }}.p8

      - name: Upload to TestFlight via altool
        run: |
          xcrun altool --upload-app \
            --type macos \
            --file ${{steps.findpkg.outputs.pkg}} \
            --apiKey "${{ secrets.APPLE_APPSTORE_KEY_ID }}" \
            --apiIssuer "${{ secrets.APPLE_APPSTORE_ISSUER_ID }}"