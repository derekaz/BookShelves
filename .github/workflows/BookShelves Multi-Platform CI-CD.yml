name: BookShelves Multi-Platform CI-CD

on:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
  push:
    branches:
       - 'main'
       - 'release/**'  
       - 'feature/**'  
       - 'features/**'
  release:
    types: [published]

concurrency:
  group: bookshelves-ci-cd-${{github.ref}}
  cancel-in-progress: true

permissions:
  contents: write

env:
  PROJPATH: 'src'
  WEB_PROJPATH: 'src/BookShelves.Web/BookShelves.Web'
  WEB_CSPROJ: 'BookShelves.Web/BookShelves.Web/BookShelves.Web.csproj' #this includes the parent folder due to it being a dockerfile build
  WEBAPI_PROJPATH: 'src/BookShelves.WebApi'
  WEBAPI_CSPROJ: 'BookShelves.WebApi/BookShelves.WebApi.csproj' #this includes the parent folder due to it being a dockerfile build
  MAUI_PROJPATH: 'src/BookShelves.Maui'
  MAUI_CSPROJ: 'BookShelves.Maui.csproj'
  MAUI_IOS_PUBLISH_PATH: '${{ github.workspace }}/publish-output/ios'
  MAUI_IOS_ARTIFACTS_PATH: 'artifacts_ios'
  MAUI_IOS_MAC_BUNDLE_ID: 'com.azmoore.bookshelves.maui'
  MAUI_IOS_CODESIGN_PROVISION: 'BookShelves Test Profile'
  MAUI_IOS_CODESIGN_KEY: 'iOS Distribution'
  MAUI_MAC_PUBLISH_PATH: '${{ github.workspace }}/publish-output/mac'
  MAUI_MAC_ARTIFACTS_PATH: 'artifacts_mac'
  MAUI_MAC_CODESIGN_PROVISION: 'BookShelves MacOS Provisioning'
  MAUI_MAC_CODESIGN_KEY: 'Apple Distribution: Derek Moore (TPKXH5FT2P)'
  MAUI_MAC_PACKAGE_SIGNING_KEY: '3rd Party Mac Developer Installer: Derek Moore (TPKXH5FT2P)'
  MAUI_MAC_CODESIGN_ENTITLEMENTS: 'Platforms/MacCatalyst/Entitlements.plist'
  MAUI_WINDOWS_PUBLISH_PATH: '${{ github.workspace }}/publish-output/windows'
  MAUI_WINDOWS_WINDOWS_ARTIFACTS_PATH: 'artifacts_windows'

  DOTNET_VERSION: 'net10.0'
  DOTNET_SDK_VERSION: '10.0.x'
  RELEASE_CONFIGURATION: 'Release'
  XCODE_VERSION: '26.4.1'

jobs:
  # =================================================================
  # STAGE 1: CORE VALIDATION & LOGICAL VERSION SYNCHRONIZATION
  # =================================================================
  validate:
    name: Verify Code & Versioning
    if: github.event_name != 'release'
    runs-on: ubuntu-latest
    outputs:
      AssemblySemFileVer: ${{ steps.gitversion.outputs.assemblySemFileVer }}
      AssemblySemVer: ${{ steps.gitversion.outputs.assemblySemVer }}
      BuildNumber: ${{ steps.gitversion.outputs.commitsSinceVersionSource }}
      CommitsSinceVersionSource: ${{ steps.gitversion.outputs.commitsSinceVersionSource }}
      DisplayVersion: ${{ steps.gitversion.outputs.majorMinorPatch }}
      FullSemVer: ${{ steps.gitversion.outputs.fullSemVer }}
      InformationalVersion: ${{ steps.gitversion.outputs.informationalVersion }}
      MajorMinorPatch: ${{ steps.gitversion.outputs.majorMinorPatch }}
      SemVer: ${{ steps.version-logic.outputs.FINAL_SEMVER }}

    defaults:
      run:
        working-directory: ${{env.PROJPATH}}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{env.DOTNET_SDK_VERSION}}

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v4.7.0
        with:
          versionSpec: '6.8.x'

      - name: Execute GitVersion Calculations
        id: gitversion
        uses: gittools/actions/gitversion/execute@v4.7.0

      # Appends a clean '-beta' tag to packages built directly via merge-to-main,
      # but preserves raw semver for production releases or features.
      - name: Calculate Environmental Suffixes
        id: version-logic
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            echo "FINAL_SEMVER=${{ steps.gitversion.outputs.semVer }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.ref_name }}" = "main" ]; then
            echo "FINAL_SEMVER=${{ steps.gitversion.outputs.semVer }}-beta" >> $GITHUB_OUTPUT
          else
            echo "FINAL_SEMVER=${{ steps.gitversion.outputs.semVer }}" >> $GITHUB_OUTPUT
          fi

      - name: Install .NET Workloads
        run: dotnet workload restore

      - name: Compile Solution (Debug Validation Step)
        run: |
          dotnet build ${{env.WEB_CSPROJ}} -c Debug
          dotnet build ${{env.WEBAPI_CSPROJ}} -c Debug
  
  # =================================================================
  # STAGE 2: CONTAINER DEPLOYMENTS (Linux Matrix Runner)
  # =================================================================
  publish-docker:
    name: Publish Containers to Private Registry
    needs: validate
    if: |
      github.event_name == 'release' || 
      github.ref_name == 'main' || 
      startsWith(github.ref_name, 'release/')    
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Log in to Private Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.NAS_DOCKER_REGISTRY_URL }}
          username: ${{ secrets.NAS_DOCKER_REGISTRY_USERNAME }}
          password: ${{ secrets.NAS_DOCKER_REGISTRY_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # --- WEB APPLICATION PROJECT ---
      - name: Build and Push Web App Docker Image
        uses: docker/build-push-action@v7
        with:
          context: ${{ github.workspace }}/src
          file: ${{env.WEB_PROJPATH}}/Dockerfile # Path to your Web App Dockerfile
          push: true
          no-cache: true
          build-args: |
            APP_VERSION=${{ needs.validate.outputs.majorMinorPatch }}
            RUN_ID=${{ github.run_id }}
            GitVersion_AssemblySemFileVer=${{ needs.validate.outputs.AssemblySemFileVer }}
            GitVersion_AssemblySemVer=${{ needs.validate.outputs.AssemblySemVer }}
            GitVersion_CommitsSinceVersionSource=${{ needs.validate.outputs.CommitsSinceVersionSource }}
            GitVersion_FullSemVer=${{ needs.validate.outputs.FullSemVer }}
            GitVersion_InformationalVersion=${{ needs.validate.outputs.InformationalVersion }}
            GitVersion_MajorMinorPatch=${{ needs.validate.outputs.MajorMinorPatch }}
            GitVersion_SemVer=${{ needs.validate.outputs.SemVer }}
          tags: |
            ${{ secrets.NAS_DOCKER_REGISTRY_URL }}/bookshelvesweb:latest
            ${{ secrets.NAS_DOCKER_REGISTRY_URL }}/bookshelvesweb:${{ needs.validate.outputs.SemVer }}

      # --- WEB API PROJECT ---
      - name: Build and Push Web API Docker Image
        uses: docker/build-push-action@v7
        with:
          context: ${{ github.workspace }}/src
          file: ${{env.WEBAPI_PROJPATH}}/Dockerfile # Path to your Web App Dockerfile
          push: true
          no-cache: true
          build-args: |
            APP_VERSION=${{ needs.validate.outputs.MajorMinorPatch }}
            RUN_ID=${{ github.run_id }}
            GitVersion_AssemblySemFileVer=${{ needs.validate.outputs.AssemblySemFileVer }}
            GitVersion_AssemblySemVer=${{ needs.validate.outputs.AssemblySemVer }}
            GitVersion_CommitsSinceVersionSource=${{ needs.validate.outputs.CommitsSinceVersionSource }}
            GitVersion_FullSemVer=${{ needs.validate.outputs.FullSemVer }}
            GitVersion_InformationalVersion=${{ needs.validate.outputs.InformationalVersion }}
            GitVersion_MajorMinorPatch=${{ needs.validate.outputs.MajorMinorPatch }}
            GitVersion_SemVer=${{ needs.validate.outputs.SemVer }}
          tags: |
            ${{ secrets.NAS_DOCKER_REGISTRY_URL }}/bookshelveswebapi:latest
            ${{ secrets.NAS_DOCKER_REGISTRY_URL }}/bookshelveswebapi:${{ needs.validate.outputs.SemVer }}

  # =================================================================
  # STAGE 3: APPLE PUBLISH (iOS .ipa & MacCatalyst .pkg on Mac)
  # =================================================================
  publish-apple:
    name: Build iOS & MacCatalyst
    needs: validate
    if: |
      github.event_name == 'release' || 
      github.ref_name == 'main' || 
      startsWith(github.ref_name, 'release/')    
    runs-on: macos-26
    timeout-minutes: 60
    defaults:
      run:
        working-directory: ${{env.MAUI_PROJPATH}}
    steps:
      - uses: actions/checkout@v7
        with: { fetch-depth: 0 }

      - name: xcode diags 1
        run: |
            echo Mac OS version: $(sw_vers -productVersion)
            echo Installed Xcode versions:
            ls /Applications | grep 'Xcode'
            echo Currently selected Xcode:
            xcrun xcode-select --print-path

      # Select your required version
      - name: Select Xcode ${{env.XCODE_VERSION}}
        run: sudo xcode-select -s /Applications/Xcode_${{env.XCODE_VERSION}}.app #/Contents/Developer

      - name: Verify Xcode version
        run: xcodebuild -version

      - name: Add Xcode developer tools to PATH
        run: export PATH="/Applications/Xcode_${{env.XCODE_VERSION}}.app/Contents/Developer/usr/bin:$PATH"
    
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: ${{env.MAUI_PROJPATH}}/global.json

      - name: Restore Workloads
        run: dotnet workload restore
        working-directory: ${{env.MAUI_PROJPATH}}

      - name: Cert Info IOS 1
        env:
          CERTIFICATE_BASE64: ${{secrets.IOS_DIST_CERTIFICATES_P12}}
        run: |
          echo $CERTIFICATE_BASE64 | base64 --decode > ios_cert.p12

      - name: Cert Info IOS 2
        run: |
          openssl pkcs12 -in ios_cert.p12 -passin pass:${{secrets.IOS_DIST_CERTIFICATES_P12_PASSWORD}} -info -nokeys

      - name: Import IOS Code-Signing Certificates
        uses: Apple-Actions/import-codesign-certs@v7
        with:
          p12-file-base64: ${{secrets.IOS_DIST_CERTIFICATES_P12}}
          p12-password: ${{secrets.IOS_DIST_CERTIFICATES_P12_PASSWORD}}
          keychain-password: ${{github.run_id}}

      - name: Cert Info MAC 1
        env:
          CERTIFICATE_BASE64: ${{secrets.MAC_COMBINED_DIST_INST_CERT_P12}}
        run: |
          echo $CERTIFICATE_BASE64 | base64 --decode > mac_cert.p12

      - name: Cert Info MAC 2
        run: |
          openssl pkcs12 -in mac_cert.p12 -passin pass:${{secrets.IOS_DIST_CERTIFICATES_P12_PASSWORD}} -info -nokeys

      - name: Import MAC Code-Signing Certificates
        uses: Apple-Actions/import-codesign-certs@v7
        with:
          # since we already have an ios cert, reuse the same keychain and password
          create-keychain: false
          keychain-password: ${{github.run_id}}

          # use this one for Mac app store/test flight
          p12-file-base64: ${{secrets.MAC_COMBINED_DIST_INST_CERT_P12}}
          
          # use this one for ad-hoc
          #p12-file-base64: ${{ secrets.APPLE_DEVELOPMENT_CERT_P12 }}
          
          p12-password: ${{secrets.IOS_DIST_CERTIFICATES_P12_PASSWORD}}

      - name: Download Apple Provisioning Profiles
        uses: Apple-Actions/download-provisioning-profiles@v6
        with:
          bundle-id: ${{env.MAUI_IOS_MAC_BUNDLE_ID}}
          issuer-id: ${{secrets.APPLE_APPSTORE_ISSUER_ID}}
          api-key-id: ${{secrets.APPLE_APPSTORE_KEY_ID}}
          api-private-key: ${{secrets.APPLE_APPSTORE_PRIVATE_KEY}}

      - name: Verify Xcode Simulators
        run: xcrun simctl list devices

      - name: Verify Dotnet SDKs
        run: dotnet --list-sdks

      - name: Verify Dotnet Version
        run: dotnet --version

      - name: Verify Dotnet Runtimes
        run: dotnet --list-runtimes

      - name: NuGet Restore
        run: dotnet restore ${{env.MAUI_CSPROJ}}
        working-directory: ${{env.MAUI_PROJPATH}}

      - name: Create IOS publish folder
        shell: pwsh
        run: |
          cd ${{ github.workspace }}
          mkdir -p ${{env.MAUI_IOS_PUBLISH_PATH}}

      - name: Create MAC publish folder
        shell: pwsh
        run: |
          cd ${{ github.workspace }}
          mkdir -p ${{env.MAUI_MAC_PUBLISH_PATH}}

      # Overrides passed directly to MSBuild properties mapping to Apple variables
      - name: Build Apple Packages
        run: |
          dotnet `
            publish `
            ${{env.MAUI_CSPROJ}} `
            -c ${{env.RELEASE_CONFIGURATION}} `
            -f ${{env.DOTNET_VERSION}}-ios `
            -p:RuntimeIdentifier=ios-arm64 `
            -o ${{env.MAUI_IOS_PUBLISH_PATH}} `
            -v normal `
            /p:ArchiveOnBuild=true `
            /p:CodesignKey="${{env.MAUI_IOS_CODESIGN_KEY}}" `
            /p:CodesignProvision="${{env.MAUI_IOS_CODESIGN_PROVISION}}" `
            /p:MtouchUseLlvm=false `
            /p:ApplicationDisplayVersion="${{needs.validate.outputs.DisplayVersion}}" `
            /p:ApplicationVersion=${{needs.validate.outputs.BuildNumber}}
            
          dotnet `
            publish `
            ${{env.MAUI_CSPROJ}} `
            -c ${{env.RELEASE_CONFIGURATION}} `
            -f ${{env.DOTNET_VERSION}}-maccatalyst `
            -c ${{env.RELEASE_CONFIGURATION}} `
            -o ${{env.MAUI_MAC_PUBLISH_PATH}} `
            -p:MtouchLink=SdkOnly `
            -p:CreatePackage=true `
            -p:EnableCodeSigning=true `
            -p:CodesignKey="${{env.MAUI_MAC_CODESIGN_KEY}}" `
            -p:CodesignProvision="${{env.MAUI_MAC_CODESIGN_PROVISION}}" `
            -p:EnablePackageSigning=true `
            -p:PackageSigningKey="${{env.MAUI_MAC_PACKAGE_SIGNING_KEY}}" `
            -p:CodesignEntitlements="${{env.MAUI_MAC_CODESIGN_ENTITLEMENTS}}" `
            -p:UseHardenedRuntime=true `
            -p:MtouchUseLlvm=false `
            /p:ApplicationDisplayVersion="${{needs.validate.outputs.DisplayVersion}}" `
            /p:ApplicationVersion=${{needs.validate.outputs.BuildNumber}}

      - name: Show workspace folder content
        shell: pwsh
        run: |
          cd '${{github.workspace}}'
          Get-Childitem -Path ${{github.workspace}} -Include *.* -File -Recurse

      - name: Show IOS publish folder content
        shell: pwsh
        run: |
          Get-Childitem -Path ${{env.MAUI_IOS_PUBLISH_PATH}} -Include *.* -File -Recurse

      - name: Show MAC publish folder content
        shell: pwsh
        run: |
          Get-Childitem -Path ${{env.MAUI_MAC_PUBLISH_PATH}} -Include *.* -File -Recurse

      - name: Locate IOS IPA
        # if: ${{ github.event_name == 'workflow_dispatch' }}
        id: findipa
        run: |
          IPA_PATH=$(find ${{env.MAUI_IOS_PUBLISH_PATH}} -maxdepth 1 -name '*.ipa' | head -n1)
          # IPA_PATH=$(find MyScoreBoardMaui/bin/${{env.RELEASE_CONFIGURATION}}/${{env.DOTNET_VERSION}}-ios/${{env.RUNTIME_ID}}/publish -maxdepth 1 -name '*.ipa' | head -n1)
          if [ -z "$IPA_PATH" ]; then
            echo 'IPA not found' >&2
            exit 1
          fi
          echo "ipa=$IPA_PATH" >> $GITHUB_OUTPUT

      - name: Locate MAC PKG
        # if: ${{ github.event_name == 'workflow_dispatch' }}
        id: findpkg
        run: |
          PKG_PATH=$(find ${{env.MAUI_MAC_PUBLISH_PATH}} -maxdepth 1 -name '*.pkg' | head -n1)
          if [ -z "$PKG_PATH" ]; then
            echo 'PKG not found' >&2
            exit 1
          fi
          echo "pkg=$PKG_PATH" >> $GITHUB_OUTPUT

      - name: Archive IOS build artifact
        uses: actions/upload-artifact@v7
        with:
          name: 'ios ipa'
          path: ${{steps.findipa.outputs.ipa}} #${{ env.IOS_ARTIFACTS_PATH }} #'${{ github.workspace }}/src/BookShelves.WinUI/bin/Release/net8.0-windows10.0.19041.0/win10-x64/AppPackages/*'
          compression-level: 0

      - name: Archive MAC build artifact
        uses: actions/upload-artifact@v7
        with:
          name: 'mac pkg'
          path: ${{steps.findpkg.outputs.pkg}}
          compression-level: 0

      - name: 'Upload IOS app to TestFlight'
        if: github.event_name == 'pull_request' || github.event_name == 'push'
        uses: apple-actions/upload-testflight-build@v5
        with:
          app-type: 'ios'
          app-path: ${{ steps.findipa.outputs.ipa }}
          issuer-id: ${{secrets.APPLE_APPSTORE_ISSUER_ID}}
          api-key-id: ${{secrets.APPLE_APPSTORE_KEY_ID}}
          api-private-key: ${{secrets.APPLE_APPSTORE_PRIVATE_KEY}}

      - name: Authenticate App Store Connect API Key
        run: |
          mkdir -p ~/private_keys
          echo "${{ secrets.APPLE_APPSTORE_PRIVATE_KEY }}" > ~/private_keys/AuthKey_${{ secrets.APPLE_APPSTORE_KEY_ID }}.p8

      - name: Upload MAC pkg to TestFlight via altool
        run: |
          xcrun altool --upload-app \
            --type macos \
            --file ${{steps.findpkg.outputs.pkg}} \
            --apiKey "${{ secrets.APPLE_APPSTORE_KEY_ID }}" \
            --apiIssuer "${{ secrets.APPLE_APPSTORE_ISSUER_ID }}"

  # =================================================================
  # STAGE 4: WINDOWS PUBLISH (MAUI .msix on Windows)
  # =================================================================
  publish-windows:
    name: Build Windows App
    needs: validate
    if: |
      github.event_name == 'release' || 
      github.ref_name == 'main' || 
      startsWith(github.ref_name, 'release/')    
    runs-on: windows-latest
    timeout-minutes: 45
    defaults:
      run:
        working-directory: ${{env.MAUI_PROJPATH}}
    steps:
      - uses: actions/checkout@v7
        with: 
          { fetch-depth: 0 }

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{env.DOTNET_SDK_VERSION}}

      - name: Add msbuild to PATH
        uses: microsoft/setup-msbuild@v3

      - name: Install MAUI Workloads
        run: dotnet workload restore
        working-directory: ${{env.PROJPATH}}

      - name: Decrypt PFX File
        run: |
          echo "${{ secrets.WINDOWS_PFX_FILE }}" > cert.pfx.asc
          certutil -decode cert.pfx.asc cert.pfx

      - name: Add Cert to Store
        run: certutil -user -q -p ${{ secrets.WINDOWS_PFX_PASSWORD }} -importpfx cert.pfx NoRoot

      - name: Create publish folder
        shell: pwsh
        run: |
          cd ${{ github.workspace }}
          mkdir -p ${{ env.MAUI_WINDOWS_PUBLISH_PATH }}

      - name: Build Windows Packages
        run: |
          dotnet publish ${{env.MAUI_CSPROJ}} `
            -v minimal `
            -f ${{env.DOTNET_VERSION}}-windows10.0.19041.0 `
            -c ${{env.RELEASE_CONFIGURATION}} `
            -o ${{ env.MAUI_WINDOWS_PUBLISH_PATH }} `
            --self-contained false `
            -p:RuntimeIdentifierOverride=win10-x64 `
            -p:InvariantGlobalization=true `
            /p:GenerateTestArtifacts=false `
            /p:WindowsPackageType=MSIX `
            /p:GenerateAppxPackageOnBuild=true `
            /p:AppxPackageSigningEnabled=true `
            /p:PackageCertificateThumbprint="${{ secrets.WINDOWS_PFX_THUMBPRINT }}"
          # -v options are quiet, minimal, normal, detailed, diagnostic

      - name: Show project folder content
        shell: pwsh
        run: |
          Get-Childitem -Path . -Include *.* -File -Recurse

      - name: Show publish folder content
        shell: pwsh
        run: |
          Get-Childitem -Path ${{ env.MAUI_WINDOWS_PUBLISH_PATH }} -Include *.* -File -Recurse

      - name: Upload Windows Installer Artifact
        uses: actions/upload-artifact@v7
        with:
          name: MAUI-Windows-App
          path: |
            ${{env.MAUI_PROJPATH}}\AppPackages\**\*.msix
            ${{env.MAUI_PROJPATH}}\AppPackages\**\*.msixbundle

