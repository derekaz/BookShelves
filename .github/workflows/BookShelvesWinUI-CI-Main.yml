      #   uses: actions/upload-artifact@v7
      #   with:
      #     name: 'win-x64 msix'
      #     path: ${{ env.WINDOWS_ARTIFACTS_PATH }} '${{ github.workspace }}/src/BookShelves.WinUI/bin/Release/net8.0-windows10.0.19041.0/win10-x64/AppPackages/*'
